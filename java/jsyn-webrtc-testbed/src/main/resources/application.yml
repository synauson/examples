# Spring server config.
server:
  port: ${TESTBED_SERVER_PORT:8080}

spring:
  application:
    name: synauson-webrtc-testbed

# Testbed-specific settings.
# Each field maps to a record component in TestbedProperties; env vars
# in the form TESTBED_FOO_BAR resolve to testbed.foo-bar via Spring's
# relaxed binding.
testbed:
  models-dir: ${TESTBED_MODELS_DIR:/opt/synauson/models}
  conference-id: ${TESTBED_CONFERENCE_ID:testbed}
  stun-server: ${TESTBED_STUN_SERVER:stun://stun.l.google.com:19302}
  # VAD defaults calibrated against canonical Silero VAD parameters.
  # Canonical VADIterator: threshold=0.5, neg_threshold=threshold-0.15, min_silence=100ms, min_speech=250ms.
  # min-silence-ms is the dominant latency driver — keep as low as tolerable.
  vad-threshold: ${TESTBED_VAD_THRESHOLD:0.5}
  vad-min-silence-ms: ${TESTBED_VAD_MIN_SILENCE_MS:100}
  vad-min-speech-ms: ${TESTBED_VAD_MIN_SPEECH_MS:250}
  # SmartTurn defaults calibrated against observed Smart Turn v3 output distribution.
  # The model outputs bimodal: not-done cluster 0.006-0.18, done cluster 0.65-0.95.
  smart-turn-buffered-samples: ${TESTBED_SMART_TURN_BUFFERED_SAMPLES:160}
  smart-turn-confidence-threshold: ${TESTBED_SMART_TURN_CONFIDENCE_THRESHOLD:0.65}

logging:
  level:
    com.synauson: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} : %msg%n"
