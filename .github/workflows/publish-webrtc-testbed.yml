name: publish-webrtc-testbed

on:
  push:
    branches: [main]
    paths:
      - 'java/jsyn-webrtc-testbed/**'
      - '.github/workflows/publish-webrtc-testbed.yml'
  workflow_dispatch:

env:
  IMAGE: bashby/synauson-webrtc-testbed

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Dockerfile's native stage compiles synauson-jni from source and the
      # runtime stage bakes in the ONNX models. Both live in synauson/synauson.
      # Check it out into _synauson/ so the Docker build context (repo root) can
      # reference it as _synauson/. _synauson/ is in .gitignore.
      - name: Checkout synauson/synauson for native build
        uses: actions/checkout@v4
        with:
          repository: synauson/synauson
          path: _synauson
          token: ${{ secrets.SYNAUSON_REPO_TOKEN }}

      - name: Wait for jsyn-natives-linux in Nexus
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          # Extract the jsyn-natives-linux version from build.gradle.kts
          VERSION=$(grep 'jsynNativesLinuxVersion' java/jsyn-webrtc-testbed/build.gradle.kts \
            | head -1 | grep -oP '"[^"]+"' | tr -d '"')
          echo "Waiting for com.synauson:jsyn-natives-linux:${VERSION} in Nexus..."
          NEXUS_URL="https://nexus.benashby.com/service/rest/v1/search"
          for i in $(seq 1 20); do
            COUNT=$(curl -sf -u "${NEXUS_USER}:${NEXUS_PASSWORD}" \
              "${NEXUS_URL}?group=com.synauson&name=jsyn-natives-linux&version=${VERSION}" \
              | python3 -c "import json,sys; print(len(json.load(sys.stdin).get('items',[])))" 2>/dev/null || echo 0)
            if [ "$COUNT" -gt "0" ]; then
              echo "Found com.synauson:jsyn-natives-linux:${VERSION} in Nexus."
              exit 0
            fi
            echo "Attempt $i/20: not yet available, waiting 30s..."
            sleep 30
          done
          echo "::error::com.synauson:jsyn-natives-linux:${VERSION} not found in Nexus after 10 minutes"
          exit 1

      - name: Compute image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          TS=$(date -u +%Y%m%d%H%M)
          BRANCH=${GITHUB_REF_NAME//\//-}
          echo "primary=${IMAGE}:${BRANCH}-${SHA}-${TS}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE}:latest"                  >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: java/jsyn-webrtc-testbed/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.primary }}
            ${{ steps.tags.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXUS_USER=${{ secrets.NEXUS_USER }}
            NEXUS_PASSWORD=${{ secrets.NEXUS_PASSWORD }}
